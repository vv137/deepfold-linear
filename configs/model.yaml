# DeepFold-Linear model configuration (SPEC v5.3)

model:
  d_model: 512
  d_msa: 64
  d_atom: 128
  h_res: 16
  h_msa: 8
  n_msa_blocks: 4
  n_uot_blocks: 48
  # Diffusion v2: encoder-transformer-decoder (Boltz-1 style)
  n_diff_transformer_layers: 24
  n_diff_encoder_blocks: 3
  n_diff_decoder_blocks: 3
  n_diff_heads: 16
  d_fourier: 256
  sigma_data: 16.0
  max_cycles: 3 # training samples uniformly from [1, max_cycles]
  inference_cycles: 3

msa:
  max_depth: 128 # max MSA rows after subsampling (uniform random [min_depth, max_depth])
  min_depth: 1 # minimum random depth during training
  max_paired: 8192 # max taxonomy-paired MSA rows across chains (Boltz default)
  max_unpaired: 16384 # max unpaired MSA rows (Boltz default)

data:
  num_workers: 4
  release_cutoff: "2019-09-30" # only train on structures before this date (YYYY-MM-DD)
  seed: 42

logging:
  save_every: 100 # checkpoint every N steps
  save_every_minutes: 60 # time-based checkpoint interval (0 = disabled)
  log_every: 1 # console/wandb log every N steps
  extra_log_every: 50 # expensive logs (heatmaps) every N steps

training:
  batch_size: 1
  # AF3 LR schedule: warmup → plateau → exponential decay
  lr: 1.0e-3 # max_lr (peak after warmup)
  base_lr: 0.0 # starting LR for warmup
  weight_decay: 0.01
  betas: [0.9, 0.95]
  warmup_steps: 1000
  start_decay_after: 50000
  decay_every: 50000
  decay_factor: 0.95
  total_steps: 500000
  ema_decay: 0.999
  ema_warmup_steps: 1000
  max_grad_norm: 10.0
  grad_accum_steps: 128
  crop_schedule:
    - [0, 256]
    # - [0, 256]
    # - [100000, 384]
    # - [300000, 512]
    # - [500000, 768]

validation:
  val_every: 1000 # validate every N steps
  val_batches: 32 # max batches per validation run (0 = all)
  validate_first: false # run full validation before training starts

loss_weights:
  w_diff: 1.0
  w_lddt: 1.0
  w_disto: 0.2
  w_trunk_coord: 0.5

sampler:
  type: cluster # "cluster" or "random"
  alpha_prot: 3.0
  alpha_nucl: 3.0
  alpha_ligand: 1.0
  beta: 1.0
  samples_per_epoch: 100000

diffusion:
  multiplicity: 16
  sigma_max: 160.0
  sigma_min: 0.002
  sigma_data: 16.0
  p_mean: -1.2
  p_std: 1.5
  rho: 7.0
  inference_steps: 200

wandb:
  enabled: false
  project: deepfold-linear
  entity: null # your wandb team/user; null = default
  name: null # run name; null = auto-generated
  tags: []
  log_every: 1 # log every N optimizer steps

init:
  gamma_std: 1.0e-4 # EGNN gamma N(0, std) noise init for symmetry breaking
  adaln_gate_bias: -2.0 # AdaLN-Zero gate bias; sigmoid(-2.0) ≈ 0.12
  # w_dist_raw is always zero-init (alg_sigmoid midpoint = 0.5), not configurable

sinkhorn:
  lambda: 1.0
  eps_heads:
    [
      0.5,
      0.5,
      0.5,
      0.5,
      1.0,
      1.0,
      1.0,
      1.0,
      2.0,
      2.0,
      2.0,
      2.0,
      4.0,
      4.0,
      4.0,
      4.0,
    ]
  k_iter: 20
  k_max_infer: 20
  tol_infer: 0.0001
