# DeepFold-Linear model configuration (SPEC v5)

model:
  d_model: 512
  d_msa: 64
  d_atom: 128
  h_res: 16
  h_msa: 8
  n_msa_blocks: 4
  n_uot_blocks: 48
  # Diffusion v2: encoder-transformer-decoder (Boltz-1 style)
  n_diff_transformer_layers: 24
  n_diff_encoder_blocks: 3
  n_diff_decoder_blocks: 3
  n_diff_heads: 16
  d_fourier: 256
  sigma_data: 16.0
  max_cycles: 5
  inference_cycles: 3

msa:
  max_depth: 128 # max MSA rows after subsampling (uniform random [1, max_depth])

training:
  batch_size: 1
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  warmup_steps: 5000
  total_steps: 500000
  ema_decay: 0.999
  ema_warmup_steps: 1000
  max_grad_norm: 1.0
  grad_accum_steps: 128
  crop_schedule:
    - [0, 256]
    # - [0, 256]
    # - [100000, 384]
    # - [300000, 512]
    # - [500000, 768]

loss_weights:
  w_diff: 1.0
  w_lddt: 1.0
  w_disto: 0.2
  w_trunk_coord: 0.5

sampler:
  type: cluster # "cluster" or "random"
  alpha_prot: 3.0
  alpha_nucl: 3.0
  alpha_ligand: 1.0
  beta: 1.0
  samples_per_epoch: 100000

diffusion:
  multiplicity: 16
  sigma_max: 160.0
  sigma_min: 0.002
  sigma_data: 16.0
  p_mean: -1.2
  p_std: 1.5
  rho: 7.0
  inference_steps: 200

wandb:
  enabled: false
  project: deepfold-linear
  entity: null  # your wandb team/user; null = default
  name: null    # run name; null = auto-generated
  tags: []
  log_every: 1  # log every N optimizer steps

sinkhorn:
  lambda: 1.0
  eps_heads:
    [
      0.5,
      0.5,
      0.5,
      0.5,
      1.0,
      1.0,
      1.0,
      1.0,
      2.0,
      2.0,
      2.0,
      2.0,
      4.0,
      4.0,
      4.0,
      4.0,
    ]
  k_iter: 20
  k_max_infer: 20
  tol_infer: 0.0001
